global:
  scrape_interval: 30s

scrape_configs:
  - job_name: homeshield
    metrics_path: /metrics
    static_configs:
      - targets: ['app:3000']
    # If METRICS_TOKEN is set on the app, authenticate the scrape — either:
    #   authorization:
    #     credentials: <METRICS_TOKEN>
    # or pass it as a query param:
    #   params:
    #     token: ['<METRICS_TOKEN>']
