# HomeShield NGFW — management server + database.
# Copy .env.example to .env and fill in the secrets before `docker compose up`.

services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-homeshield}
      MYSQL_USER: ${DB_USER:-homeshield}
      MYSQL_PASSWORD: ${DB_PASS:?set DB_PASS in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?set DB_ROOT_PASS in .env}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-homeshield}
      DB_USER: ${DB_USER:-homeshield}
      DB_PASS: ${DB_PASS:?set DB_PASS in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      AGENT_TOKEN: ${AGENT_TOKEN:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    ports:
      - "${APP_PORT:-3000}:3000"

  # Monitoring stack — start with: docker compose --profile monitoring up -d
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: [monitoring]
    depends_on: [app]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: [monitoring]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"

volumes:
  db_data:
  prom_data:
  grafana_data:

